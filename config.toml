baseURL = "https://www.jonasskanoy.xyz"
title = "Jonas B. Skånøy"
theme = "hugo-coder"
languageCode = "en-us"
defaultContentLanguage = "en"

paginate = 20

pygmentsStyle = "bw"
pygmentsCodeFences = true
pygmentsCodeFencesGuessSyntax = true

enableEmoji = true
# Enable Disqus comments
# disqusShortname = "yourdiscussshortname"

[params]
author = "Jonas Berg Skånøy"
# license = '<a rel="license" href="http://creativecommons.org/licenses/by-sa/4.0/">CC BY-SA-4.0</a>'
description = "Jonas Berg Skånøy's personal website"
keywords = "blog,developer,personal"
info = ["Philosophy", "Tech"]
avatarURL = "images/profile.jpg"
#gravatar = "john.doe@example.com"

favicon_32 = "/img/favicon-32x32.png"
favicon_16 = "/img/favicon-16x16.png"


dateFormat = "January 2, 2006"
since = 2022

# Right To Left, shift content direction for languagues such as Arabic
rtl = false

colorScheme = "auto"
hideColorSchemeToggle = false
maxSeeAlsoItems = 5

# Custom CSS
customCSS = []
# Custom SCSS, file path is relative to Hugo's asset folder (default: {your project root}/assets)
customSCSS = []
# Custom JS
customJS = []

[taxonomies]
category = "categories"
series = "series"
tag = "tags"
author = "authors"

[[params.social]]
name = "Github"
icon = "fa fa-2x fa-github"
weight = 1
url = "https://github.com/jonasskanoy/"

[[params.social]]
