baseURL = "https://www.jonasskanoy.xyz"
title = "Jonas B. Skånøy"
theme = "hugo-coder"
languageCode = "en"
defaultContentLanguage = "en"


paginate = 20


pygmentsStyle = "bw"
pygmentsCodeFences = false
pygmentsCodeFencesGuessSyntax = false
enableEmoji = true

[params]
author = "Jonas B. Skånøy"
description = "Jonas Skånøy's personal website"
keywords = "blog,developer,personal"
info = ["Philosophy", "Tech"]
avatarURL = "images/profile.jpg"
#gravatar = "john.doe@example.com"
	
favicon_32 = "images/profile.jpg"
favicon_16 = "images/profile.jpg"


dateFormat = "2/1/2006"
since = 2022

enableTwemoji = true

# Right To Left, shift content direction for languagues such as Arabic
rtl = false

# Specify light/dark colorscheme
# Supported values:
# "auto" (use preference set by browser)
# "dark" (dark background, light foreground)
# "light" (light background, dark foreground) (default)
colorScheme = "auto"

# Hide the toggle button, along with the associated vertical divider
hideColorSchemeToggle = false
	
# Custom CSS
customCSS = ["css/custom.css"]

# Custom SCSS, file path is relative to Hugo's asset folder (default: {your project root}/assets)
customSCSS = []
	
# Custom JS
customJS = []

[taxonomies]
category = "categories"
series = "series"
tag = "tags"
author = "authors"

